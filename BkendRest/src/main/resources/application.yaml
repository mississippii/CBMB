spring:
  application:
    name: BkendRest
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/business_cbm}
    username: ${DB_USERNAME:veer}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  address: 127.0.0.1

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# Frontend origins allowed to call the API. "*" is acceptable while the server
# is bound to 127.0.0.1; tighten this before exposing the API on a network.
app:
  cors:
    allowed-origins: "*"
  supplier-portal:
    token-secret: ${SUPPLIER_PORTAL_TOKEN_SECRET:dev-supplier-portal-secret-change-me}

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info
